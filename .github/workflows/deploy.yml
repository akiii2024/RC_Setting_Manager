name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.35.3'
        channel: 'stable'
        
    - name: Install dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test

    - name: Validate deployment configuration
      env:
        FIREBASE_APP_CHECK_WEB_KEY: ${{ vars.FIREBASE_APP_CHECK_WEB_KEY }}
      run: test -n "$FIREBASE_APP_CHECK_WEB_KEY"
      
    - name: Build web
      run: >-
        flutter build web
        --base-href "/RC_Setting_Manager/"
        --dart-define=FIREBASE_APP_CHECK_WEB_KEY=${{ vars.FIREBASE_APP_CHECK_WEB_KEY }}
        --release
      
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './build/web'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
