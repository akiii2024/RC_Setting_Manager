<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="description" content="RC Car Setting Manager">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="settingsheet_manager">

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <title>RC Car Setting Manager</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background-color: #4CAF50;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>Loading RC Car Setting Manager...</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            const scriptUrl = registration.active?.scriptURL
              || registration.waiting?.scriptURL
              || registration.installing?.scriptURL
              || "";

            if (scriptUrl.endsWith("/sw.js")) {
              registration.unregister();
            }
          });
        });
      });
    }

    window.addEventListener("load", function () {
      const basePath = document.querySelector("base").getAttribute("href");
      const basePathWithoutSlash = basePath.endsWith("/") ? basePath.slice(0, -1) : basePath;
      const isPWA = window.matchMedia("(display-mode: standalone)").matches
        || window.navigator.standalone === true
        || document.referrer.includes("android-app://");

      if (isPWA) {
        if (window.location.pathname !== basePath && window.location.pathname !== basePath + "index.html") {
          window.history.replaceState({}, "", basePath);
        }
        return;
      }

      const path = window.location.pathname;
      const hash = window.location.hash;

      if (path !== basePath && path !== basePath + "index.html") {
        const url = new URL(window.location.href);
        const relativePath = path.startsWith(basePathWithoutSlash)
          ? path.substring(basePathWithoutSlash.length)
          : path;

        url.searchParams.set("route", relativePath);
        if (hash) {
          url.searchParams.set("hash", hash.substring(1));
        }
        window.history.replaceState({}, "", url);
      } else if (hash) {
        const url = new URL(window.location.href);
        url.searchParams.set("route", hash.substring(1));
        window.history.replaceState({}, "", url);
      }
    });

    window.addEventListener("flutter-first-frame", function () {
      const loading = document.querySelector("#loading");
      if (loading) {
        loading.style.display = "none";
      }
      document.body.style.background = "transparent";
    });
  </script>
</body>
</html>
