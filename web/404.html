<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RC Car Setting Manager</title>
  <script>
    (function () {
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      const segments = path.split("/").filter(Boolean);
      const repoBase = segments.length > 0 ? "/" + segments[0] + "/" : "/";
      const remainingPath = segments.length > 1 ? "/" + segments.slice(1).join("/") : "";
      const redirect = new URL(repoBase, window.location.origin);

      if (remainingPath) {
        redirect.searchParams.set("route", remainingPath);
      }
      if (search) {
        const source = new URLSearchParams(search);
        source.forEach(function (value, key) {
          redirect.searchParams.set(key, value);
        });
      }
      if (hash) {
        redirect.searchParams.set("hash", hash.substring(1));
      }

      window.location.replace(redirect.toString());
    })();
  </script>
</head>
<body>
  <div style="text-align: center; padding: 50px;">
    <h1>Loading...</h1>
    <p>Redirecting to the application.</p>
  </div>
</body>
</html>
